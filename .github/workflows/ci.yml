name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  read-only-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile all scripts
        run: python -m py_compile scripts/*.py scripts/collect/*.py
      - name: Collectors must be read-only
        run: ./scripts/check_readonly.sh
